apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-deploy
spec:
  replicas: 2
  selector: { matchLabels: { app: cart } }
  template:
    metadata: { labels: { app: cart } }
    spec:
      containers:
        - name: cart
          image: cart-service:latest
          imagePullPolicy: Never
          ports: [{ containerPort: 3001 }]
---
apiVersion: v1
kind: Service
metadata:
  name: cart-svc
spec:
  selector: { app: cart }
  ports:
    - port: 80
      targetPort: 3001
      protocol: TCP
